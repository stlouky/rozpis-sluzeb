{% extends "_layout.html" %}
{% block titulek %}Nový požadavek – Rozpis služeb{% endblock %}
{% block obsah %}
{% include "_hlavicka.html" %}
<main>
  <h1>Nový požadavek</h1>
  {% if chyba %}<p class="chyba">{{ chyba }}</p>{% endif %}
  <form method="post" action="/pozadavky" class="formular">
    <label>Zaměstnanec
      <select name="zamestnanec_id" required>
        {% for z in zamestnanci %}
          <option value="{{ z.id }}">{{ z.jmeno }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Od
      <input type="date" name="od" required>
    </label>
    <label>Do
      <input type="date" name="do" required>
    </label>
    <label>Popis
      <input type="text" name="popis" placeholder="např. volno na svatbu">
    </label>
    <button type="submit">Podat požadavek</button>
  </form>
</main>
{% endblock %}
